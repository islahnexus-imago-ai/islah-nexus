<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>God Form Mirror</title>
  <style>
    :root {
      --bg: #06070f;
      --card: #12152a;
      --text: #f2f4ff;
      --accent: #8d7dff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1d2040, var(--bg));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px;
    }

    .panel {
      width: min(700px, 100%);
      background: color-mix(in oklab, var(--card), black 18%);
      border: 1px solid color-mix(in oklab, var(--accent), black 55%);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
    }

    label {
      display: block;
      margin-bottom: 8px;
      opacity: 0.85;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #363b64;
      background: #0d1022;
      color: var(--text);
      resize: vertical;
      outline: none;
    }

    .mirror-wrap {
      margin-top: 18px;
      background: #0a0d1d;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #2a3158;
      overflow: hidden;
    }

    .source {
      font-size: clamp(1.2rem, 3.8vw, 2.2rem);
      font-weight: 700;
      line-height: 1.25;
      text-wrap: balance;
      text-shadow: 0 0 20px rgba(141, 125, 255, 0.35);
    }

    .reflection {
      font-size: clamp(1.2rem, 3.8vw, 2.2rem);
      font-weight: 700;
      line-height: 1.25;
      transform: scaleY(-1);
      opacity: 0.55;
      filter: blur(0.4px);
      margin-top: 6px;
      text-wrap: balance;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
      -webkit-mask-image: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
    }

    .hint {
      margin-top: 10px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Simple Mirror Reflection</h1>
    <label for="textInput">Paste your text (example: "Your God Form")</label>
    <textarea id="textInput" placeholder="Paste words here...">Your God Form</textarea>

    <section class="mirror-wrap" aria-live="polite">
      <div id="sourceText" class="source">Your God Form</div>
      <div id="reflectionText" class="reflection" aria-hidden="true">Your God Form</div>
    </section>

    <p class="hint">Tip: this is a text mirror effect using CSS transform + fade mask.</p>
  </main>

  <script>
    const input = document.getElementById('textInput');
    const source = document.getElementById('sourceText');
    const reflection = document.getElementById('reflectionText');

    function updateMirror() {
      const value = input.value.trim() || 'Your God Form';
      source.textContent = value;
      reflection.textContent = value;
    }

    input.addEventListener('input', updateMirror);
    updateMirror();
  </script>
</body>
</html>
